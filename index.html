<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>German Random Word Trainer</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 100px;
    }

    h1 {
        font-size: 32px;
    }

    #word {
        font-size: 60px;
        font-weight: bold;
        margin: 40px;
    }

    button {
        font-size: 20px;
        padding: 12px 25px;
        margin: 10px;
        cursor: pointer;
    }
</style>

</head>

<body>

<h1>Deutscher Worttrainer</h1>

<div id="word">Bereit?</div>

<button onclick="startTrainer()">▶ Start</button>
<button onclick="stopTrainer()">⏹ Stop</button>


<script>

let words = [];
let currentWord = "";
let running = false;


// Load voices
speechSynthesis.onvoiceschanged = function() {
    speechSynthesis.getVoices();
};


// Load word list
fetch("https://gist.githubusercontent.com/MarvinJWendt/2f4f4154b8ae218600eb091a5706b5f4/raw/36b70dd6be330aa61cd4d4cdfda6234dcb0b8784/wordlist-german.txt")

.then(response => response.text())

.then(text => {

    words = text
        .split(/\r?\n/)
        .map(word => word.trim())
        .filter(word => word !== "");


    document.getElementById("word").innerHTML =
        "Geladen: " + words.length + " Wörter";

})

.catch(error => {

    document.getElementById("word").innerHTML =
        "Fehler beim Laden der Wortliste";

    console.error(error);

});



// Start trainer
function startTrainer() {

    if (words.length === 0) {

        alert("Wortliste wird noch geladen...");
        return;

    }


    running = true;

    nextWord();

}



// Stop trainer
function stopTrainer() {

    running = false;

    speechSynthesis.cancel();

    document.getElementById("word").innerHTML =
        "Pause";

}



// Next random word
function nextWord() {

    if (!running) return;


    let randomIndex =
        Math.floor(Math.random() * words.length);


    currentWord = words[randomIndex];


    document.getElementById("word").innerHTML =
        currentWord;


    speakWord();

}



// Speak with preferred German voice
function speakWord() {


    let speech =
        new SpeechSynthesisUtterance(currentWord);


    speech.lang = "de-DE";

    // slower for language learners
    speech.rate = 0.75;

    speech.pitch = 1;



    let voices =
        speechSynthesis.getVoices();



    // Prefer Google German voice
    let germanVoice =
        voices.find(voice =>
            voice.name.includes("Google") &&
            voice.lang.startsWith("de")
        );



    // Otherwise any German voice
    if (!germanVoice) {

        germanVoice =
            voices.find(voice =>
                voice.lang.startsWith("de")
            );

    }



    if (germanVoice) {

        speech.voice = germanVoice;

        console.log(
            "Using voice:",
            germanVoice.name
        );

    }



    // Go to next word after speaking
    speech.onend = function() {


        if (running) {


            setTimeout(() => {

                nextWord();

            }, 1500);


        }

    };



    speechSynthesis.cancel();

    speechSynthesis.speak(speech);

}


</script>


</body>
</html>
